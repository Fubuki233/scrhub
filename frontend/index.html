<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web scrcpy - Device Manager</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Web scrcpy</h1>
        <p class="subtitle">Remote Android Device Control</p>
    </header>

    <main>
        <div class="toolbar">
            <div class="add-device-form">
                <input type="text" id="device-addr" placeholder="IP:Port (e.g. 192.168.43.1:5555)" />
                <button class="btn btn-connect" onclick="adbConnect()">Connect IP</button>
            </div>
        </div>
        <div id="device-list" class="device-grid">
            <div class="loading">Scanning for devices...</div>
        </div>
    </main>

    <script>
        const deviceList = document.getElementById('device-list');
        let pollTimer = null;

        async function fetchDevices() {
            try {
                const resp = await fetch('/api/devices');
                if (!resp.ok) throw new Error(resp.statusText);
                const devices = await resp.json();
                renderDevices(devices);
            } catch (e) {
                deviceList.innerHTML = '<div class="error">Failed to fetch devices: ' + escapeHtml(e.message) + '</div>';
            }
        }

        function renderDevices(devices) {
            if (!devices || devices.length === 0) {
                deviceList.innerHTML = '<div class="empty">No devices found. Connect an Android device via ADB.</div>';
                return;
            }

            deviceList.innerHTML = devices.map(dev => {
                const isUSB = dev.conn_type === 'usb';
                let actions = '';
                if (dev.adb_state === 'device') {
                    if (dev.connected) {
                        actions = `<button class="btn btn-view" onclick="viewDevice('${escapeAttr(dev.serial)}')">View</button>
                                   <button class="btn btn-disconnect" onclick="disconnectDevice('${escapeAttr(dev.serial)}')">Disconnect</button>`;
                    } else {
                        actions = `<button class="btn btn-connect" onclick="connectDevice('${escapeAttr(dev.serial)}')">Connect</button>`;
                    }
                    if (isUSB && !dev.connected) {
                        actions += `<button class="btn btn-wifi" onclick="enableWiFi('${escapeAttr(dev.serial)}')">Switch WiFi</button>`;
                    }
                    if (!isUSB) {
                        actions += `<button class="btn btn-adb-disconnect" onclick="adbDisconnect('${escapeAttr(dev.serial)}')">ADB Disconnect</button>`;
                    }
                } else {
                    actions = '<span class="offline-label">Offline</span>';
                }
                return `
                <div class="device-card ${dev.connected ? 'connected' : ''}" data-serial="${escapeAttr(dev.serial)}">
                    <div class="device-icon">${dev.connected ? '📱' : '📵'}</div>
                    <div class="device-info">
                        <h3>${escapeHtml(dev.model || dev.serial)}</h3>
                        <p class="serial">${escapeHtml(dev.serial)}</p>
                        <p class="state ${dev.adb_state}">
                            ${escapeHtml(dev.adb_state)}
                            <span class="conn-type ${dev.conn_type}">${isUSB ? '🔌 USB' : '📶 WiFi'}</span>
                        </p>
                        ${dev.info ? `<p class="stream-info">${dev.info.VideoWidth}×${dev.info.VideoHeight}</p>` : ''}
                    </div>
                    <div class="device-actions">${actions}</div>
                </div>`;
            }).join('');
        }

        async function connectDevice(serial) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Connecting...';

            try {
                const resp = await fetch(`/api/devices/${encodeURIComponent(serial)}/connect`, { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.text();
                    throw new Error(err);
                }
                await fetchDevices();
            } catch (e) {
                alert('Connection failed: ' + e.message);
                await fetchDevices();
            }
        }

        async function disconnectDevice(serial) {
            try {
                await fetch(`/api/devices/${encodeURIComponent(serial)}/disconnect`, { method: 'POST' });
                await fetchDevices();
            } catch (e) {
                alert('Disconnect failed: ' + e.message);
            }
        }

        async function adbConnect() {
            const input = document.getElementById('device-addr');
            const addr = input.value.trim();
            if (!addr) return;

            // Basic validation
            if (!/^\d{1,3}(\.\d{1,3}){3}:\d{1,5}$/.test(addr)) {
                alert('Invalid format. Use IP:Port (e.g. 192.168.43.1:5555)');
                return;
            }

            try {
                const resp = await fetch('/api/adb/connect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({address: addr})
                });
                if (!resp.ok) throw new Error(await resp.text());
                input.value = '';
                await fetchDevices();
            } catch (e) {
                alert('ADB connect failed: ' + e.message);
            }
        }

        async function adbDisconnect(serial) {
            try {
                const resp = await fetch('/api/adb/disconnect', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({address: serial})
                });
                if (!resp.ok) throw new Error(await resp.text());
                await fetchDevices();
            } catch (e) {
                alert('ADB disconnect failed: ' + e.message);
            }
        }

        async function enableWiFi(serial) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Switching...';

            try {
                const resp = await fetch(`/api/devices/${encodeURIComponent(serial)}/tcpip`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({port: 5555})
                });
                if (!resp.ok) throw new Error(await resp.text());
                const result = await resp.json();
                alert('WiFi ADB enabled! Device available at: ' + result.address);
                await fetchDevices();
            } catch (e) {
                alert('Switch WiFi failed: ' + e.message);
                await fetchDevices();
            }
        }

        function viewDevice(serial) {
            window.open(`/player.html?serial=${encodeURIComponent(serial)}`, '_blank');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return str.replace(/[&"'<>]/g, c => ({
                '&': '&amp;', '"': '&quot;', "'": '&#39;', '<': '&lt;', '>': '&gt;'
            })[c]);
        }

        // Initial fetch and polling
        fetchDevices();
        pollTimer = setInterval(fetchDevices, 3000);

        // Enter key to connect
        document.getElementById('device-addr').addEventListener('keydown', e => {
            if (e.key === 'Enter') adbConnect();
        });
    </script>
</body>
</html>
